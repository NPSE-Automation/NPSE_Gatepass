<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
 <link rel="stylesheet" href="style.css">
  
  <style>
    body, html { 
      height: 100%; 
      margin: 0; 
      background-color: #f8f9fa; /* Clean light grey background */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    /* NUCLEAR HIDE: This ensures hidden views actually disappear */
    .hidden-view { display: none !important; }
    
    /* Modern Centered Layout */
    .center-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      width: 100%;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Professional Card Container */
    .login-card {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* Soft modern shadow */
      width: 100%;
      max-width: 400px;
    }

    .form-control {
      font-weight: 500;
      background-color: #f8f9fa !important;
      border: 1px solid #dee2e6 !important;
      transition: all 0.2s;
    }

    .form-control:focus {
      background-color: #ffffff !important;
      border-color: #0d6efd !important;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }
  </style>
</head>
<body>

<div id="mainAppContainer">
  
  <div id="loginView" class="center-layout">
    <div class="login-card">
      
      <div class="text-center mb-4 pb-3 border-bottom">
        <img src="https://drive.google.com/thumbnail?id=1iHhwmvkdlDIbWs-zH0DrSNn60nEtBxrE&sz=w800" alt="NPSE Logo" style="height: 45px; margin-bottom: 12px; object-fit: contain;">
        <h4 class="fw-bolder mb-1" style="color: #0d6efd; letter-spacing: 0.5px;">NPSE Automation Pvt. Ltd.</h4>
        <p class="text-muted small fw-bold text-uppercase mb-0" style="letter-spacing: 1px;">Secure Gatepass</p>
      </div>

      <div class="form-floating mb-3">
        <input type="text" class="form-control shadow-none" id="l_id" placeholder="Employee ID" value="NPSE-">
        <label class="text-muted"><i class="bi bi-person-badge me-2"></i>Employee ID</label>
      </div>
      
      <div class="form-floating mb-4 position-relative">
        <input type="password" class="form-control shadow-none pe-5" id="l_pass" placeholder="Password">
        <label class="text-muted"><i class="bi bi-shield-lock me-2"></i>Password</label>
        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 fs-5" id="toggleLoginPass" style="cursor: pointer; color: #6c757d;" onclick="togglePassword('l_pass', 'toggleLoginPass')"></i>
      </div>

      <button id="loginBtn" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mb-3" style="border-radius: 0.5rem; background: #0d6efd; border: none;">
        LOGIN
      </button>

      <div class="text-center mb-4">
        <a href="javascript:void(0)" class="text-muted small fw-bold text-decoration-none" onclick="alert('Please contact the Master Admin to reset your password. \n\nSystem alerts have been sent to management.')">Forgot Password?</a>
      </div>

      <div class="text-center pt-3 border-top border-light-subtle">
        <p class="text-muted small mb-0 fw-bold">New Employee? <a href="javascript:void(0)" id="toReg" class="text-primary text-decoration-none" onclick="switchView('reg')">Register Here</a></p>
      </div>

    </div>
  </div>

  <div id="regView" class="hidden-view center-layout">
    <div class="login-card" style="max-width: 450px;">
      
      <div class="text-center mb-4 pb-3 border-bottom">
        <img src="https://drive.google.com/thumbnail?id=1iHhwmvkdlDIbWs-zH0DrSNn60nEtBxrE&sz=w800" alt="NPSE Logo" style="height: 40px; margin-bottom: 12px; object-fit: contain;">
        <h5 class="fw-bolder mb-1" style="color: #0d6efd; letter-spacing: 0.5px;">NPSE Automation Pvt. Ltd.</h5>
        <p class="text-muted small fw-bold text-uppercase mb-0" style="letter-spacing: 1px;">Employee Registration</p>
      </div>
      
      <div class="mb-3">
        <label class="small fw-bold text-muted">Assigned Employee ID</label>
        <input type="text" id="r_id" class="form-control fw-bold border-0" style="background: #e9ecef !important;" readonly>
      </div>

      <div class="form-floating mb-3">
        <input type="text" id="r_name" class="form-control shadow-none" placeholder="Full Name">
        <label class="text-muted">Full Name</label>
      </div>

      <div class="mb-3">
        <select id="r_dept" class="form-select py-3 text-muted shadow-none">
          <option value="">Select Department...</option>
          <option value="Electrical">Electrical</option>
          <option value="Design">Design</option>
          <option value="Production">Production</option>
         <option value="Machine Shop">Machine Shop</option>
          <option value="Quality">Quality</option>
          <option value="Assembly">Assembly</option>
          <option value="Assembly 2">Assembly 2</option>
          <option value="Account">Account</option>
          <option value="Purchase">Purchase</option>
          <option value="Fabrication">Fabrication</option>
          <option value="HR">HR</option>
          <option value="MIS">MIS</option>
           <option value="Sales">Sales</option>
        </select>
      </div>

      <div class="mb-3 border rounded p-3" style="background-color: #f8f9fa;">
        <label class="small fw-bold text-muted d-block mb-2">Profile Photo Capture</label>
        <input type="file" id="r_photo" class="form-control form-control-sm mb-2 shadow-none" accept="image/*" onchange="previewImage(this)">
        <input type="hidden" id="r_imageData">
        <div class="text-center">
          <img id="regPhotoPreview" class="img-thumbnail rounded-circle shadow-sm" style="width: 70px; height: 70px; object-fit: cover; display:none;">
        </div>
      </div>

      <div class="form-floating mb-4 position-relative">
        <input type="password" id="r_pass" class="form-control shadow-none pe-5" placeholder="Password">
        <label class="text-muted">Create Password (6+ chars)</label>
        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 fs-5" id="toggleRegPass" style="cursor: pointer; color: #6c757d;" onclick="togglePassword('r_pass', 'toggleRegPass')"></i>
      </div>

      <button id="regBtn" class="btn btn-success w-100 py-3 fw-bold rounded-3 shadow-sm mb-3" >CREATE ACCOUNT</button>
      
      <div class="text-center pt-3 border-top border-light-subtle">
        <p class="text-muted small mb-0 fw-bold">Already registered? <a href="javascript:void(0)" id="toLog" class="text-primary text-decoration-none" onclick="switchView('log')">Return to Login</a></p>
      </div>

    </div>
  </div>

<div id="empDashView" class="hidden-view"></div>
<div id="adminDashView" class="hidden-view"></div>

<script>
  // 🚀 THE FIX: दोन्ही HTML फाईल्स पूर्ण लोड झाल्यावरच ॲप चालू करा!
  Promise.all([
    fetch('employee.html').then(r => r.text()).then(data => { document.getElementById('empDashView').innerHTML = data; }),
    fetch('admin.html').then(r => r.text()).then(data => { document.getElementById('adminDashView').innerHTML = data; })
  ]).then(() => {
    // फाईल्स पूर्ण लोड झाल्यावरच ऑटो-लॉगिन चेक करा
    if (typeof checkAutoLogin === 'function') {
       checkAutoLogin();
    }
  }).catch(err => console.error("UI Load Error:", err));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 <script src="app.js?v=10"></script>
  <script>
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = document.getElementById(iconId);
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
      }
    }
  </script>

</body>
</html>
