<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NPSE Guard Console</title>
  
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    /* 📱 BASE STYLES & RESPONSIVENESS */
    html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
    body { background-color: #0a0a0a; color: white; display: flex; flex-direction: column; font-family: Arial, sans-serif; transition: background-color 0.3s; }
    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    
    /* 🔵 TOP BAR WITH LOGO (BLUE THEME) */
    .top-bar { background: #1e293b; padding: 15px 20px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #0d6efd; z-index: 10; transition: all 0.3s;}
    .light-mode .top-bar { background: #ffffff; border-bottom: 4px solid #0d6efd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    /* 🚨 LOGO STYLES */
    .company-logo { height: 45px; margin-right: 15px; border-radius: 5px; object-fit: contain; }
    
    .top-bar-text { display: flex; flex-direction: column; align-items: flex-start; }
    .top-bar .t1 { font-size: 1.2rem; font-weight: 900; color: #ffffff; margin-bottom: 2px; }
    .light-mode .top-bar .t1 { color: #0f172a; }
    .top-bar .t2 { font-size: 0.85rem; font-weight: bold; color: #93c5fd; letter-spacing: 1px; }
    .light-mode .top-bar .t2 { color: #0d6efd; }

    /* SECTIONS */
    .main-section { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 100px; width: 100%; }
    
    /* SCANNER UI */
    .scanner-box { width: 100%; max-width: 550px; aspect-ratio: 1/1; border: 4px solid #0d6efd; border-radius: 20px; overflow: hidden; position: relative; background: #000; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(13, 110, 253, 0.2); margin-bottom: 20px; }
    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .scan-overlay { position: absolute; width: 60%; height: 60%; border: 4px solid #0d6efd; border-radius: 20px; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.7); }
    .scanning .scan-overlay { animation: pulse 1.5s infinite; }

    /* BUTTONS & BADGES */
    .status-badge { width: 100%; max-width: 550px; padding: 15px; border-radius: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; }
    .s-ready  { background:#1e293b; border:2px solid #475569; color:#94a3b8; }
    .s-active { background:#0a2a5e; border:2px solid #0d6efd; color:#6ea8fe; }
    .s-saving { background:#451a03; border:2px solid #f59e0b; color:#fbbf24; }
    .s-error  { background:#450a0a; border:2px solid #ef4444; color:#f87171; }
    
    .btn-giant { width: 100%; max-width: 550px; padding: 18px; font-size: 1.2rem; font-weight: 800; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

    /* 🔵 VISITOR CARDS (BLUE THEME) */
    .visitor-card { background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; border-left: 8px solid #0d6efd; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); width: 100%; max-width: 700px; transition: transform 0.2s; }
    .visitor-card:active { transform: scale(0.98); }
    .v-details p { margin-bottom: 5px; font-size: 1.1rem; color: #475569; }
    .v-details strong { color: #0f172a; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 10px; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 25px rgba(0,0,0,0.4); z-index: 1000; }
    .nav-btn { background: transparent; border: none; color: #64748b; font-weight: bold; font-size: 14px; padding: 10px; display: flex; flex-direction: column; align-items: center; flex: 1; }
    .nav-btn i { font-size: 26px; margin-bottom: 5px; }
    .nav-btn.active-scanner { color: #0d6efd; }
    .nav-btn.active-visitors { color: #0d6efd; }

    /* 🔄 SILENT REFRESH ANIMATION */
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .spinning-icon { animation: spinFast 1s linear infinite; }
    @keyframes pulse { 0% { border-color: #0d6efd; } 50% { border-color: #6ea8fe; } 100% { border-color: #0d6efd; } }
  </style>
</head>

  <div id="scannerSection" class="main-section">

      <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
        <h3 class="fw-bolder text-dark mb-0"><i class="bi bi-people-fill text-primary me-2"></i> गेटवर थांबलेले लोक</h3>
        <button class="btn btn-outline-primary rounded-circle shadow-sm d-flex align-items-center justify-content-center" onclick="loadApprovedVisitors(false)" style="width: 45px; height: 45px;">
          <i id="refreshBtnIcon" class="bi bi-arrow-clockwise fs-4"></i>
        </button>

      <button id="nav-visitors" class="nav-btn position-relative" onclick="showGuardTab('visitors')">

        <span id="visitorCountBadge" class="position-absolute badge rounded-pill bg-danger d-none" style="top: 5px; right: 25%; font-size: 14px; padding: 5px 8px;">0</span>
      </button>
  </div>

  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" style="z-index: 2000;">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark border-primary border-2 rounded-4 text-center p-4">
        <i class="bi bi-check-circle-fill text-primary" style="font-size: 4rem;"></i>
        <h3 class="fw-bold text-white mt-3" id="locName">📍 लोकेशन</h3>
        <p class="text-secondary fs-5" id="scanTime">वेळ</p>
        <button class="btn btn-primary btn-lg fw-bold rounded-pill mt-3 w-100" data-bs-dismiss="modal" onclick="startScanner()">पुढील स्कॅन करा 🔄</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔴 तुझी डिप्लॉयमेंट लिंक (Live /exec)
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbxEPrgwchsGMq0A1-vzgst67coeCHkedKEIyVs8ZHE/exec"; 

    window.google = { script: { run: getRunner(null, null) } };
    function getRunner(onSuccess, onFailure) {
        return new Proxy({}, {
            get: function(target, prop) {
                if (prop === 'withSuccessHandler') return function(cb) { return getRunner(cb, onFailure); };
                if (prop === 'withFailureHandler') return function(cb) { return getRunner(onSuccess, cb); };
                return function(...args) {
                    fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: prop, args: args })
                    })
                    .then(r => r.json())
                    .then(data => { if (onSuccess) onSuccess(data); })
                    .catch(err => { if (onFailure) onFailure(err); });
                };
            }
        });
    }

    // 🔀 TAB SWITCHING
    function showGuardTab(tab) {
       const scannerSec = document.getElementById('scannerSection');
       const visitorSec = document.getElementById('visitorSection');
       const body = document.getElementById('appBody');
       const subtitle = document.getElementById('headerSubtitle');

       if (tab === 'scanner') {
           scannerSec.style.display = 'flex';
           visitorSec.style.display = 'none';
           body.classList.remove('light-mode');
           subtitle.innerText = "रात्रीचा सिक्युरिटी राऊंड";
           document.getElementById('nav-scanner').classList.add('active-scanner');
           document.getElementById('nav-visitors').classList.remove('active-visitors');
       } else {
           scannerSec.style.display = 'none';
           visitorSec.style.display = 'flex';
           body.classList.add('light-mode');
           subtitle.innerText = "नवीन अभ्यागत तपासणी";
           document.getElementById('nav-visitors').classList.add('active-visitors');
           document.getElementById('nav-scanner').classList.remove('active-scanner');
           
           // पहिली वेळ असेल तर पूर्ण लोडिंग दाखवा (false)
           loadApprovedVisitors(false);
           if (isScanning) stopScanner();
       }
    }

    // ==========================================
    // 🤫 SILENT REFRESH LOGIC (बॅकग्राउंडमध्ये डेटा आणणे)
    // ==========================================
    function loadApprovedVisitors(isSilent = false) {
        const container = document.getElementById('visitorListContainer');
        const refreshIcon = document.getElementById('refreshBtnIcon');
        
        // जर Silent नसेल (मॅन्युअल क्लिक किंवा पहिली वेळ), तर स्क्रीनवर मोठा स्पिनर दाखवा
        if (!isSilent) {
            container.innerHTML = '<div class="text-center py-5 text-muted mt-5"><div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div><h4 class="fw-bold">सर्व्हरवरून माहिती घेत आहे...</h4></div>';
        } else {
            // जर Silent असेल, तर फक्त वरच्या कोपऱ्यातलं बटण फिरवा (स्क्रीन तशीच ठेवा)
            if (refreshIcon) refreshIcon.classList.add('spinning-icon');
        }
        
        google.script.run
            .withSuccessHandler(function(res) {
                // डेटा आल्यावर स्पिनर थांबवा
                if (refreshIcon) refreshIcon.classList.remove('spinning-icon');

                if (res && res.status === "Success") {
                    const visitors = res.data;
                    const badgeEl = document.getElementById('visitorCountBadge');
                    
                    if (visitors.length > 0) {
                        badgeEl.innerText = visitors.length;
                        badgeEl.classList.remove('d-none');
                    } else {
                        badgeEl.classList.add('d-none');
                    }

                    let html = '';
                    if (visitors.length === 0) {
                        html = `
                          <div class="text-center py-5 bg-white rounded-4 border border-primary border-opacity-25 mt-4 p-5 shadow-sm">
                             <i class="bi bi-shield-check text-primary display-1 opacity-50 mb-3"></i>
                             <h2 class="fw-bold text-dark">गेटवर कोणीही नाही!</h2>
                             <p class="text-muted fs-5 mb-0">आजचे कोणतेही मंजूर झालेले अभ्यागत गेटवर थांबलेले नाहीत.</p>
                          </div>`;
                    } else {
                        visitors.forEach(v => {
                            let photoHtml = (v.facePhoto && v.facePhoto.length > 50) 
                                ? `<img src="${v.facePhoto}" class="shadow-sm" style="width: 90px; height: 90px; object-fit: cover; border-radius: 50%; border: 3px solid #0d6efd; margin-right: 20px;">` 
                                : `<div class="d-flex justify-content-center align-items-center bg-light text-secondary shadow-sm" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid #cbd5e1; margin-right: 20px;"><i class="bi bi-person-fill" style="font-size: 3rem;"></i></div>`;

                            html += `
                            <div class="visitor-card">
                               <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2 border-primary border-opacity-25">
                                 <span class="badge bg-primary bg-opacity-10 text-primary border border-primary px-3 py-2 fs-6"><i class="bi bi-check-circle-fill me-1"></i> बॉसने मंजूर केले</span>
                                 <span class="text-muted fw-bold fs-6">ID: ${v.passId}</span>
                               </div>
                               
                               <div class="d-flex align-items-center mb-4">
                                  ${photoHtml}
                                  <div>
                                      <h2 class="fw-bolder mb-1 text-dark">${v.name}</h2>
                                      <div class="v-details">
                                          <p class="mb-1 text-secondary"><i class="bi bi-building me-2"></i> <strong class="text-dark">${v.company}</strong></p>
                                          <p class="mb-0 text-secondary"><i class="bi bi-person-badge me-2"></i> भेटणारी व्यक्ती: <strong class="text-dark">${v.host}</strong></p>
                                      </div>
                                  </div>
                               </div>

                               <button class="btn btn-primary btn-giant w-100" onclick="allowVisitorEntry('${v.passId}', this)">
                                 <i class="bi bi-door-open-fill me-2 fs-4"></i> आत सोडा (ALLOW ENTRY)
                               </button>
                            </div>
                            `;
                        });
                    }
                    // शेवटी एकाच वेळी HTML अपडेट करा (म्हणजे फ्लिकर होणार नाही)
                    container.innerHTML = html;
                } else {
                    let errText = res ? res.message : "Unknown backend failure.";
                    container.innerHTML = `<div class="alert alert-danger fs-5 rounded-4 shadow-sm">⚠️ सर्व्हर त्रुटी: ${errText}</div>`;
                }
            })
            .withFailureHandler(function(err) {
                if (refreshIcon) refreshIcon.classList.remove('spinning-icon');
                if (!isSilent) {
                    container.innerHTML = `
                      <div class="alert alert-danger fs-5 rounded-4 shadow-sm border border-danger border-2 p-4 text-center mt-4">
                        <i class="bi bi-wifi-off display-4 text-danger d-block mb-3"></i>
                        <b class="fs-4">🚨 कनेक्शन एरर:</b><br><br>
                        <span class="text-dark fw-bold bg-white p-2 rounded">${err.message || err}</span>
                      </div>`;
                }
            })
            .getApprovedVisitorsForGuard();
    }

    function allowVisitorEntry(passId, btn) {
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> नोंद करत आहे...';
        btn.disabled = true;
        
        google.script.run
            .withSuccessHandler(function(res) {
                if (res.status === "Success") {
                    btn.style.background = '#0f172a';
                    btn.style.borderColor = '#0f172a';
                    btn.innerHTML = '<i class="bi bi-check-all me-2"></i> आत सोडले';
                    // १ सेकंदानंतर गुपचूप रिफ्रेश करा
                    setTimeout(() => loadApprovedVisitors(true), 1000);
                } else {
                    alert("त्रुटी: " + res.message);
                    btn.innerHTML = '<i class="bi bi-door-open-fill me-2"></i> आत सोडा';
                    btn.disabled = false;
                }
            })
            .withFailureHandler(function(err) {
                alert("🚨 सर्व्हर एरर: " + (err.message || err));
                btn.innerHTML = '<i class="bi bi-door-open-fill me-2"></i> आत सोडा';
                btn.disabled = false;
            })
            .markVisitorEntered(passId);
    }

    // 🔄 दर 15 सेकंदांनी 'Silent Fetch' (फक्त छोटं बटण फिरेल, स्क्रीन तशीच राहील)
    setInterval(function() {
        if (document.getElementById('visitorSection').style.display === 'flex') {
            loadApprovedVisitors(true); // true = Silent Refresh
        }
    }, 15000);

    // ==========================================
    // 📷 QR SCANNER LOGIC 
    // ==========================================
    let stream = null;
    let isScanning = false;
    let scanningLoop = null;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('hiddenCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const badge = document.getElementById('badge');
    const toggleBtn = document.getElementById('toggleBtn');
    const scannerContainer = document.getElementById('scannerContainer');

    function setBadge(type, msg) {
      badge.className = `status-badge ${type}`;
      badge.innerText = msg;
    }

    async function handleToggleClick() {
      if (isScanning) stopScanner();
      else await startScanner();
    }

    async function startScanner() {
      try {
        setBadge('s-ready', '⏳ कॅमेरा सुरू होत आहे...');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 640 } }
        });
        
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        await video.play();

        const track = stream.getVideoTracks()[0];
        setTimeout(async () => {
          try {
              const caps = track.getCapabilities();
              if (caps.torch) await track.applyConstraints({ advanced: [{ torch: true }] });
              else await track.applyConstraints({ torch: true });
          } catch(err) { console.log("Torch constraint failed"); }
        }, 1000); 
        
        isScanning = true;
        scannerContainer.classList.add('scanning');
        video.style.display = 'block';
        
        toggleBtn.innerHTML = '<i class="bi bi-stop-circle-fill me-2"></i> कॅमेरा बंद करा';
        toggleBtn.className = 'btn btn-danger btn-giant';
        
        setBadge('s-active', '🎯 QR कोड समोर धरा');
        scanningLoop = requestAnimationFrame(tick);
      } catch (err) {
        console.error(err);
        setBadge('s-error', '❌ कॅमेरा चालू करता आला नाही.');
      }
    }

    function stopScanner() {
      isScanning = false;
      scannerContainer.classList.remove('scanning');
      if (scanningLoop) cancelAnimationFrame(scanningLoop);
      if (stream) stream.getTracks().forEach(track => track.stop());
      video.srcObject = null;
      video.style.display = 'none';
      
      toggleBtn.innerHTML = '<i class="bi bi-camera-video-fill me-2"></i> कॅमेरा सुरू करा';
      toggleBtn.className = 'btn btn-primary btn-giant';
      setBadge('s-ready', '📷 कॅमेरा बंद आहे');
    }

    function tick() {
      if (!isScanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = 400; canvas.height = 400;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code && code.data) {
          onQRDetected(code.data); 
          stopScanner();          
          return; 
        }
      }
      scanningLoop = requestAnimationFrame(tick);
    }

    function onQRDetected(text) {
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      setBadge('s-saving', '⏳ स्कॅन पूर्ण झाले, कृपया प्रतीक्षा करा...');
      
      const livePhotoBase64 = canvas.toDataURL('image/jpeg', 0.5); 

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.status === "Success") {
            const locName = res.message.replace('Scan recorded: ', '').trim();
            const now = new Date();
            document.getElementById('locName').innerText = '📍 ' + locName;
            document.getElementById('scanTime').innerText = now.toLocaleDateString('mr-IN') + ' | ' + now.toLocaleTimeString('mr-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
            
            new bootstrap.Modal(document.getElementById('successModal')).show();
            setBadge('s-active', '✅ स्कॅन यशस्वीरित्या नोंदवले गेले!');
          } else {
            setBadge('s-error', '❌ त्रुटी: ' + (res ? res.message : 'अज्ञात त्रुटी'));
            setTimeout(startScanner, 3000); 
          }
        })
        .recordGuardScan(text, livePhotoBase64); 
    }

    // Default start
    showGuardTab('scanner');
  </script>
</body>
</html>
