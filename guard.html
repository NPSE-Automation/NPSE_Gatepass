<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instant Guard Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      background: #1a1a2e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-bottom: 3px solid #0d6efd;
    }
    .top-bar-text .t1 { font-size: 15px; font-weight: 800; color: #fff; }
    .top-bar-text .t2 { font-size: 11px; color: #93c5fd; text-transform: uppercase; }

    .main {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    /* LIVE VIDEO CONTAINER */
    .scanner-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      border-radius: 16px;
      border: 3px solid #334155;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Target overlay box to guide the guard */
    .scan-overlay {
      position: absolute;
      width: 60%;
      height: 60%;
      border: 4px solid #0d6efd;
      border-radius: 12px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      transition: border-color 0.3s;
    }
    
    .scanning .scan-overlay {
      animation: pulse 1.5s infinite;
    }

    /* STATUS BADGE */
    .status-badge {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
    }
    .s-ready  { background:#1e293b; border:2px solid #475569; color:#94a3b8; }
    .s-active { background:#1a3a2a; border:2px solid #22c55e; color:#4ade80; }
    .s-saving { background:#2a2010; border:2px solid #f59e0b; color:#fbbf24; }
    .s-error  { background:#3a1a1a; border:2px solid #ef4444; color:#f87171; }

    /* ACTION BUTTONS */
    .action-btn {
      width: 100%;
      padding: 18px;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .action-btn.stop { background: #dc3545; }

    /* SUCCESS DIALOG */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: #111827;
      border: 2px solid #22c55e;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .success-loc { font-size: 24px; font-weight: 800; color: #4ade80; margin: 10px 0 4px; }
    .success-time { font-size: 14px; color: #9ca3af; margin-bottom: 20px; }
    .close-btn {
      width: 100%; padding: 14px;
      background: #22c55e; color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }

    @keyframes pulse {
      0% { opacity: 0.6; border-color: #0d6efd; }
      50% { opacity: 1; border-color: #22c55e; }
      100% { opacity: 0.6; border-color: #0d6efd; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-text">
    <div class="t1">NPSE Automation Pvt. Ltd.</div>
    <div class="t2">Instant Tour Scanner</div>
  </div>
</div>

<div class="main">
  <div id="badge" class="status-badge s-ready">📷 कॅमेरा बंद आहे</div>

  <div class="scanner-container" id="scannerContainer">
    <video id="video" playsinline></video>
    <div class="scan-overlay"></div>
  </div>

  <button id="toggleBtn" class="action-btn" onclick="handleToggleClick()">🎥 कॅमेरा सुरू करा</button>
</div>

<div id="successModal" class="modal">
  <div class="modal-content">
    <div style="font-size: 48px;">✅</div>
    <div class="success-loc" id="locName">—</div>
    <div class="success-time" id="scanTime">—</div>
    <button class="close-btn" onclick="closeModal()">पुढील स्कॅन करा 🔄</button>
  </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
  // ========================================================
  // MAGIC BRIDGE (For GitHub Pages to connect to Google Apps Script)
  // ========================================================
  // 🔴 तुझी सर्वात नवीन डिप्लॉयमेंट लिंक इथे टाक:
  const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbx11poC2Xv57yafkd1VNALE9mrxqX45RA8ZwCXVht4Ab-JhUCl3C5KXuMdxHdYqbvMH/exec"; 

  window.google = { script: { run: getRunner(null, null) } };
  function getRunner(onSuccess, onFailure) {
      return new Proxy({}, {
          get: function(target, prop) {
              if (prop === 'withSuccessHandler') return function(cb) { return getRunner(cb, onFailure); };
              if (prop === 'withFailureHandler') return function(cb) { return getRunner(onSuccess, cb); };
              return function(...args) {
                  fetch(GOOGLE_API_URL, {
                      method: 'POST',
                      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                      body: JSON.stringify({ action: prop, args: args })
                  })
                  .then(r => r.json())
                  .then(data => { if (onSuccess) onSuccess(data); })
                  .catch(err => { if (onFailure) onFailure(err); });
              };
          }
      });
  }
  // ========================================================

  let stream = null;
  let isScanning = false;
  let scanningLoop = null;
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('hiddenCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const badge = document.getElementById('badge');
  const toggleBtn = document.getElementById('toggleBtn');
  const container = document.getElementById('scannerContainer');

  async function handleToggleClick() {
    if (isScanning) {
      stopScanner();
    } else {
      await startScanner();
    }
  }

async function startScanner() {
    try {
      setBadge('s-ready', '⏳ कॅमेरा सुरू होत आहे...');
      
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 640 } }
      });
      
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      await video.play();

      // 🔦 ANTI-FRAUD HACK: FORCE FLASHLIGHT ON
      const track = stream.getVideoTracks()[0];
      try {
        setTimeout(async () => {
            const capabilities = track.getCapabilities();
            if (capabilities.torch) {
                await track.applyConstraints({ advanced: [{ torch: true }] });
            }
        }, 500);
      } catch(err) {
        console.log("Torch not supported on this device/browser.");
      }
      
      isScanning = true;
      container.classList.add('scanning');
      
      // ✅ FIX: तुझा ओरिजिनल 'लाल बटणाचा' क्लास वापरला आहे
      toggleBtn.innerText = '🛑 कॅमेरा बंद करा';
      toggleBtn.className = 'action-btn stop';
      
      setBadge('s-active', '🎯 QR कोड समोर धरा (इन्स्टंट स्कॅन होईल)');
      
      scanningLoop = requestAnimationFrame(tick);
    } catch (err) {
      console.error(err);
      setBadge('s-error', '❌ कॅमेरा चालू करता आला नाही. परवानगी तपासा.');
    }
  }

function stopScanner() {
    isScanning = false;
    container.classList.remove('scanning');
    if (scanningLoop) cancelAnimationFrame(scanningLoop);
    
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    video.srcObject = null;
    
    // ✅ FIX: तुझा ओरिजिनल 'निळ्या बटणाचा' क्लास वापरला आहे
    toggleBtn.innerText = '🎥 कॅमेरा सुरू करा';
    toggleBtn.className = 'action-btn';
    
    setBadge('s-ready', '📷 कॅमेरा बंद आहे');
  }

  function tick() {
    if (!isScanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = 400;
      canvas.height = 400;
      
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "dontInvert"
      });

      if (code && code.data) {
        onQRDetected(code.data); // 📸 आधी फोटो काढा (stopScanner च्या वर पाहिजे)
        stopScanner();           // 🛑 मग कॅमेरा बंद करा
        return; 
      }
    }
    scanningLoop = requestAnimationFrame(tick);
  }

function onQRDetected(text) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    setBadge('s-saving', '📸 फोटो आणि नोंद सेव्ह होत आहे...');

    const livePhotoBase64 = canvas.toDataURL('image/jpeg', 0.5); 

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.status === "Success") {
          const locName = res.message.replace('Scan recorded: ', '').trim();
          const now = new Date();
          const t = now.toLocaleTimeString('mr-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
          const d = now.toLocaleDateString('mr-IN');

          document.getElementById('locName').innerText = '📍 ' + locName;
          document.getElementById('scanTime').innerText = d + ' | ' + t;
          document.getElementById('successModal').classList.add('show');
          setBadge('s-active', '✅ नोंद आणि पुरावा (फोटो) सेव्ह झाला!');
        } else {
          setBadge('s-error', '❌ त्रुटी: ' + (res ? res.message : 'अज्ञात त्रुटी'));
          setTimeout(startScanner, 3000); 
        }
      })
      .withFailureHandler(function() {
        setBadge('s-error', '❌ इंटरनेट नाही! पुन्हा प्रयत्न करा.');
        setTimeout(startScanner, 3000);
      })
      .recordGuardScan(text, livePhotoBase64); 
  }

  function closeModal() {
    document.getElementById('successModal').classList.remove('show');
    startScanner(); 
  }

  function setBadge(type, msg) {
    // ✅ FIX: तुझे ओरिजिनल डार्क थीमचे कलर्स वापरले आहेत
    badge.className = `status-badge ${type}`;
    badge.innerText = msg;
  }
</script>
</body>
</html>
